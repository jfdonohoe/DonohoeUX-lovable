<p class="label">Application UI</p><h1>Tooltip</h1>
<p>Hover/focus-revealed bubble. CSS-only — no JS needed.</p>

<div class="lib-demo" style="display:flex; gap:1.5rem; padding:3rem 1.5rem;">
  <span class="tooltip-wrap"><button class="btn btn-secondary" style="border:1px solid hsl(var(--border));">Hover me</button><span class="tooltip-bubble">Helpful hint</span></span>
  <span class="tooltip-wrap"><button class="arrow-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08 4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08 4.24-4.24"/></svg></button><span class="tooltip-bubble">Settings</span></span>
</div>

<code class="lib-code">&lt;span class="tooltip-wrap"&gt;
  &lt;button&gt;Trigger&lt;/button&gt;
  &lt;span class="tooltip-bubble"&gt;Tooltip text&lt;/span&gt;
&lt;/span&gt;</code>
